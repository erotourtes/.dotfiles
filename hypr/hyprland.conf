$terminal = kitty
$fileManager = nautilus
$menu = rofi -show drun

source = ~/.config/hypr/configs/colors.conf

source = ~/.config/hypr/configs/startup.conf
source = ~/.config/hypr/configs/keymaps.conf
source = ~/.config/hypr/configs/input.conf
source = ~/.config/hypr/configs/hy3.conf
# source = ~/.config/hypr/configs/hy.conf

# source = ~/.config/hypr/configs/ext1.conf

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    gaps_in = 3
    gaps_out = 5
    border_size = 2
    col.active_border = $accent $accent_alt 45deg
    col.inactive_border = rgba(595959aa)

    resize_on_border = true
    extend_border_grab_area = 25
}

animations {
    enabled = yes

    bezier = windowIn, 0.06, 0.71, 0.25, 1
    bezier = windowResize, 0.04, 0.67, 0.38, 1
    bezier = fast, 0.05, 1, 0.01, 1

    animation = windowsIn, 1, 3, windowIn, slide #popin 20%
    animation = windowsOut, 1, 3, windowIn, slide #popin 70%
    animation = windowsMove, 1, 2.5, windowResize

    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default

    animation = workspaces, 0, 9, fast
    animation = fade, 1, 3, fast
    animation = layers, 1, 1.5, default, fade
}

layerrule = blur on, ignore_alpha 0, match:namespace rofi

layerrule = blur on, ignore_alpha 0, match:namespace waybar

layerrule = blur on, ignore_alpha 0, match:namespace swaync-control-center
layerrule = blur on, ignore_alpha 0, match:namespace swaync-notification-window

decoration {
    rounding = 5

    blur {
        enabled = true
        size = 7
        passes = 4
        noise = 0.008
        contrast = 0.8916
        brightness = 0.8
    }

    shadow {
        enabled = true
        ignore_window = true
        range = 20
        offset = 0 2
        render_power = 4
        color = rgba(0000002A)
    }

    active_opacity = 1.0
    inactive_opacity = 0.999
    fullscreen_opacity = 1.0

    dim_inactive = true
    dim_strength = 0.1
    dim_special = 0.8
}

dwindle {
    preserve_split = true
    pseudotile = true
}

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
windowrule = border_size 0, match:workspace w[tv1] # https://github.com/hyprwm/Hyprland/issues/1478

# 1. IDEs
windowrule = workspace 1 silent, match:class ^(jetbrains-.*)$
windowrule = workspace 1 silent, match:class ^(cursor)$
# 2. Main Browser
windowrule = workspace 2 silent, match:class ^([Ff]irefox|org.mozilla.firefox|[Ff]irefox-esr)$
# 3. For duplicated purposes
# 4. Hobby (Drawing / Gaming / Reading)
windowrule = workspace 4 silent, match:class ^(krita)$
windowrule = workspace 4 silent, match:class ^(com.github.xournalpp.xournalpp)$
windowrule = workspace 4 silent, match:class ^(steam)$
windowrule = workspace 4 silent, match:class ^(steam_app_.*)$
# 5. Tools
windowrule = workspace 5 silent, match:class ^(chrome-www.desmos.com__scientific-Default)$
windowrule = workspace 5 silent, match:class ^(chrome-translate.google.com__-Default)$
windowrule = workspace 5 silent, match:class ^(DBeaver)$
# 6.
# 7. Productivity tools
windowrule = workspace 7 silent, match:class ^(obsidian)$
windowrule = workspace 7 silent, match:class ^(chrome-calendar.google.com__-Default)$
windowrule = workspace 7 silent, match:class ^(chrome-kjbdgfilnfhdoflbpgamdcdgpehopbep-Default)$
windowrule = workspace 7 silent, match:class ^(chrome-glhjejmflhdjpaimbkdnhfpbbgdgjkoh-Default)$
windowrule = float on, match:class ^(chrome-glhjejmflhdjpaimbkdnhfpbbgdgjkoh-Default)$
windowrule = size 335 198, match:class ^(chrome-glhjejmflhdjpaimbkdnhfpbbgdgjkoh-Default)$
windowrule = move 932 7, match:class ^(chrome-glhjejmflhdjpaimbkdnhfpbbgdgjkoh-Default)$


# 8. For duplicated purposes & OBS
windowrule = workspace 8 silent, match:class ^(com.obsproject.Studio)$
# 9. Music / Browser
windowrule = workspace 9 silent, match:class ^(chrome-cinhimbnkkaeohfgghhklpknlkffjgod-Default)$
windowrule = workspace 9 silent, match:class ^(google-chrome)$
# 10. Social
windowrule = workspace 10 silent, match:class ^(org.telegram.desktop)$
windowrule = workspace 10 silent, match:class ^(chrome-mdpkiolbdkhdjpekfbkbmhigcaggjagi-Default)$
windowrule = workspace 10 silent, match:class ^(Slack)$
# Misc
windowrule = workspace special:misc silent, match:class ^(org.pulseaudio.pavucontrol)$
windowrule = workspace special:misc silent, match:class ^(huiontablet)$
windowrule = workspace special:misc silent, match:class ^(jetbrains-toolbox)$
windowrule = workspace special:misc silent, match:class ^(Zoho Mail - Desktop)$

bind = super, y, tagwindow, noscreenshare
windowrule {
  name = "Hide window from sharing"
  match:tag = noscreenshare

  no_screen_share = true
  border_color = rgb(ff0000) rgb(ff0000)
}

