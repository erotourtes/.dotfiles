# ly-inspired hyprlock theme
#
# Hyprlock still authenticates the current session user. This only changes the
# screen to look closer to ly's small terminal login manager UI.

source = ~/.config/hypr/configs/colors.conf

$font = Monospace
$term_bg = rgba(080a0cff)
$panel_bg = rgba(0c0f11f2)
$panel_border = rgba(8f9ba8ff)
$panel_text = rgba(d8dee9ff)
$panel_dim = rgba(7b8490ff)
$panel_accent = rgba(8fbcbbff)
$panel_error = rgba(e06c75ff)
$panel_check = rgba(98c379ff)

general {
    hide_cursor = true
    ignore_empty_input = true
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 3, linear
    animation = fadeOut, 1, 3, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    color = $term_bg
}

shape {
    monitor =
    size = 520, 250
    color = $panel_bg
    rounding = 0
    border_size = 1
    border_color = $panel_border
    shadow_passes = 2
    shadow_size = 8
    shadow_color = rgba(000000aa)

    position = 0, 0
    halign = center
    valign = center
    zindex = 0
}

shape {
    monitor =
    size = 130, 28
    color = $term_bg
    rounding = 0
    border_size = 1
    border_color = $panel_border

    position = 0, 125
    halign = center
    valign = center
    zindex = 1
}

label {
    monitor =
    text = Login
    font_size = 15
    font_family = $font
    color = $panel_accent

    position = 0, 125
    halign = center
    valign = center
    zindex = 2
}

label {
    monitor =
    text = cmd[update:1000] date +"%Y-%m-%d %H:%M:%S"
    font_size = 13
    font_family = $font
    color = $panel_dim

    position = 0, 88
    halign = center
    valign = center
    zindex = 2
}

label {
    monitor =
    text = user:
    font_size = 14
    font_family = $font
    color = $panel_dim

    position = -144, 30
    halign = center
    valign = center
    zindex = 2
}

label {
    monitor =
    text = $USER
    font_size = 14
    font_family = $font
    color = $panel_text

    position = -28, 30
    halign = center
    valign = center
    zindex = 2
}

label {
    monitor =
    text = layout:
    font_size = 14
    font_family = $font
    color = $panel_dim

    position = -136, -6
    halign = center
    valign = center
    zindex = 2
}

label {
    monitor =
    text = $LAYOUT[us,ua]
    font_size = 14
    font_family = $font
    color = $panel_text
    onclick = hyprctl switchxkblayout all next

    position = -50, -6
    halign = center
    valign = center
    zindex = 2
}

label {
    monitor =
    text = password:
    font_size = 14
    font_family = $font
    color = $panel_dim

    position = -125, -46
    halign = center
    valign = center
    zindex = 2
}

input-field {
    monitor =
    size = 280, 24
    outline_thickness = 0
    inner_color = rgba(00000000)
    outer_color = rgba(00000000)
    check_color = $panel_check
    fail_color = $panel_error
    font_color = $panel_text
    fade_on_empty = false
    rounding = 0

    font_family = $font
    placeholder_text =
    fail_text =
    check_text =
    dots_text_format = *
    dots_size = 0.75
    dots_spacing = 0.14
    dots_center = false

    position = 82, -50
    halign = center
    valign = center
    zindex = 2
}
